<!DOCTYPE html>
<html lang="en">
<head>
    <title>First VR App with A-Frame</title>
    <script src="./js/aframe.js"></script>
</head>
<body>
<a-scene>
    <a-box position="0 1.6 -5" color="red"  scale="2 2 2"></a-box>
    <a-sphere position="-3 1.6 -5" color="blue" radius="1"></a-sphere>
    <a-cylinder position="3 1.6 -5" color="green" radius="0.5" height="2"></a-cylinder>
    <a-plane position="0 0 -5" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
    <a-sky color="black"></a-sky>
</a-scene>
</body>
</html>
